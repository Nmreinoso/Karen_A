name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        # This 'working-directory' is the secret sauce
        run: npm install
        working-directory: ./Karen_A

      - name: Build Astro
        run: npm run build
        working-directory: ./Karen_A

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # We tell it the finished site is inside the Karen_A/dist folder
          path: ./Karen_A/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
