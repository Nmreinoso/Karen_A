name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build
        # This one-liner finds your package.json wherever it is and builds there
        run: |
          SUBFOLDER=$(find . -name "package.json" -not -path "*/node_modules/*" -exec dirname {} \;)
          cd $SUBFOLDER
          npm install
          npm run build
          # We move the result to a predictable location for the next step
          mv dist ../dist_final

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist_final

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
