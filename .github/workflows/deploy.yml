name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build
        # We are forcing the robot to go into the specific nested folder
        run: |
          cd Karen_A
          npm install
          npm run build
          # Move the finished site up one level so the 'Upload' step can see it
          mv dist ../dist_final

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This matches the folder we created above
          path: ./dist_final

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
